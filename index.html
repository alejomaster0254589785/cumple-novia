<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins';background:#140a22;color:white;}

/* 🎬 INTRO */
#intro{
  position:fixed; inset:0; background:black;
  display:flex; justify-content:center; align-items:center;
  z-index:9999; animation: fadeOut 4s forwards;
}
.intro-text{color:white;font-size:2rem;opacity:0;animation: aparecerTexto 3s forwards;}
@keyframes aparecerTexto{to{opacity:1;}}
@keyframes fadeOut{0%,80%{opacity:1;}100%{opacity:0;visibility:hidden;}}

/* 📸 COLLAGE */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}
#collage img{
  position:absolute;
  width:180px;
  opacity:0.15;
  animation: flotar linear infinite;
}
@keyframes flotar{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-120vh);}
}

header{text-align:center;padding:50px;}
h1{font-family:'Great Vibes';font-size:3rem;}

.section{padding:30px;text-align:center;}
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* INPUTS */
input,textarea{
  padding:10px;
  border-radius:10px;
  border:none;
  width:100%;
  max-width:300px;
  background: rgba(255,255,255,0.08);
  color:#fff;
  height:45px;
}
textarea{resize:none;}

/* FILA */
.fila{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* BOTON */
button{
  height:45px;
  padding:0 20px;
  background:#a855f7;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px rgba(168,85,247,0.6);
}

/* VIDEOS */
#videos video{
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* MENSAJE FLOTANTE */
.mensaje-flotante{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#a855f7;
  padding:15px 20px;
  border-radius:15px;
}

/* CARTA */
.oculto{display:none;}
.carta{
  margin-top:20px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  text-align:left;
}

/* 🎁 SORPRESA */
.sorpresa-box{
  animation: aparecerSorpresa 1s ease;
  background: rgba(168,85,247,0.2);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(168,85,247,0.6);
}
@keyframes aparecerSorpresa{
  from{transform:scale(0.5); opacity:0;}
  to{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="intro-text">Una historia… 💜</div>
</div>

<!-- 📸 COLLAGE -->
<div id="collage"></div>

<!-- 🎵 MÚSICA -->
<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<!-- 🎥 UPLOAD -->
<div class="section">
<div class="card">
<h3>🎥 Subir video</h3>
<input type="file" id="videoUpload">

<h3>📸 Subir foto</h3>
<input type="file" id="imageUpload">
</div>
</div>

<!-- 💌 MENSAJE -->
<div class="section">
<div class="card">
<h3>💌 Mensaje</h3>
<div class="fila">
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>
</div>
</div>

<!-- 📩 CONFIRMAR -->
<div class="section">
<div class="card">
<h3>📩 Confirmar asistencia</h3>
<div class="fila">
<input id="nombre" placeholder="Tu nombre">
<input id="correo" placeholder="Tu correo">
<button onclick="confirmar()">Confirmar</button>
</div>
</div>
</div>

<!-- 🎥 VIDEOS -->
<div class="section">
<div class="card">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>
</div>

<!-- 💌 CARTA -->
<div class="section">
<div class="card">
<h3>💌 Para ti</h3>
<button onclick="abrirCarta()">Ábreme 💜</button>

<div id="carta" class="carta oculto">
<p id="textoCarta"></p>
</div>
</div>
</div>

<!-- 🔐 SECRETO -->
<div class="section">
<div class="card">
<h3>🔐 Sección Secreta</h3>
<button onclick="mostrarSecreto()">Entrar 💜</button>

<div id="secreto" class="oculto">
<h4>Solo para ti 💜</h4>

<video controls width="300">
<source src="video.mp4">
</video>

<video controls width="300">
<source src="cancion.mp4">
</video>

</div>
</div>
</div>

<!-- 🎁 SORPRESA -->
<div class="section">
<div class="card">
<h3>🎁 Sorpresa</h3>
<button onclick="mostrarSorpresa()">Descubrir 💜</button>

<div id="sorpresa" class="oculto sorpresa-box">
<h2>💆‍♀️ Bono SPA juntos 💜</h2>
</div>
</div>
</div>

<script>
const API = "https://TU-BACKEND.onrender.com";

// 🎵 música
document.body.addEventListener("click", ()=>{
 document.getElementById("musica").play();
},{once:true});

// contador
const fecha = new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 let dias=Math.floor(d/(1000*60*60*24));
 contador.innerText=`Faltan ${dias} días 💜`;
},1000);

// mensaje flotante
function mostrarMensaje(texto){
 const div=document.createElement("div");
 div.className="mensaje-flotante";
 div.innerText=texto;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),3000);
}

// subir video
videoUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-video",{method:"POST",body:f});
 mostrarMensaje("🎥 Video subido");
 cargarVideos();
};

// subir imagen
imageUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-image",{method:"POST",body:f});
 mostrarMensaje("📸 Imagen subida");
 cargarCollage();
};

// confirmar
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });
 mostrarMensaje("💜 Confirmado");
}

// mensaje
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });
 mostrarMensaje("💌 Mensaje enviado");
}

// videos
async function cargarVideos(){
 let r=await fetch(API+"/videos");
 let data=await r.json();
 videos.innerHTML="";
 data.forEach(v=>{
  let el=document.createElement("video");
  el.src=API+v;
  el.controls=true;
  videos.appendChild(el);
 });
}

// collage
async function cargarCollage(){
 let r=await fetch(API+"/images");
 let data=await r.json();

 collage.innerHTML="";

 data.forEach(img=>{
  let el=document.createElement("img");
  el.src=API+img;
  el.style.left=Math.random()*100+"%";
  el.style.animationDuration=(15+Math.random()*10)+"s";
  collage.appendChild(el);
 });
}

cargarVideos();
cargarCollage();

// carta
const mensajeCarta="Desde el momento en que te vi supe que eras tú... 💜";

function abrirCarta(){
 document.body.style.background="rgba(0,0,0,0.9)";
 carta.classList.remove("oculto");
 escribirTexto(mensajeCarta, textoCarta);
}

function escribirTexto(texto, elemento){
 elemento.innerHTML="";
 let i=0;
 let t=setInterval(()=>{
  elemento.innerHTML+=texto[i];
  i++;
  if(i>=texto.length) clearInterval(t);
 },40);
}

// secreto
function mostrarSecreto(){
 secreto.classList.toggle("oculto");
}

// sorpresa
function mostrarSorpresa(){
 sorpresa.classList.remove("oculto");
}
</script>

</body>
</html>
