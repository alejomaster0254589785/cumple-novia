<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins';background:#140a22;color:white;overflow-x:hidden;}

.bg-collage {position:fixed;inset:0;z-index:-1;}
.bg-collage img{position:absolute;width:200px;opacity:0.2;animation: float 20s linear infinite;}
@keyframes float {0%{transform:translateY(100vh);}100%{transform:translateY(-120vh);}}

header{text-align:center;padding:50px;}
h1{font-family:'Great Vibes';font-size:3rem;}
.section{padding:30px;text-align:center;}

.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;}

input,textarea{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  width:80%;
  max-width:350px;
  box-sizing:border-box;
  background: rgba(255,255,255,0.08);
  color:#fff;
  transition: all 0.25s ease;
}

textarea{height:40px;}

/* ✨ focus */
input:focus, textarea:focus{
  outline:none;
  background: rgba(255,255,255,0.12);
  box-shadow:0 0 0 2px rgba(168,85,247,0.6),0 0 15px rgba(168,85,247,0.4);
  transform:scale(1.02);
}

/* ✨ placeholder animado */
input::placeholder, textarea::placeholder{
  color:#c084fc;
  transition: all 0.3s ease;
}

input:focus::placeholder, textarea:focus::placeholder{
  transform: translateY(-10px);
  opacity:0.5;
  font-size:12px;
}

button{padding:10px;background:#a855f7;color:white;border:none;border-radius:10px;cursor:pointer;}

/* 💌 mensaje flotante */
.mensaje-flotante{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#a855f7;
  padding:15px 20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation: aparecer 0.5s ease, desaparecer 0.5s ease 3s forwards;
}

@keyframes aparecer{
  from{opacity:0; transform:translateY(20px);} 
  to{opacity:1; transform:translateY(0);} 
}

@keyframes desaparecer{
  to{opacity:0; transform:translateY(20px);} 
}

/* ✨ animación al escribir */
.escribiendo{
  box-shadow:0 0 10px rgba(168,85,247,0.7);
}

</style>
</head>

<body>

<div class="bg-collage" id="collage"></div>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<div class="section">
<div class="card">

<h3>💌 Mensaje</h3>
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea>
<button onclick="enviarMensaje()">Enviar</button>

</div>
</div>

<script>
const API = "https://TU-BACKEND.onrender.com";

// contador
const fecha = new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 let dias=Math.floor(d/(1000*60*60*24));
 document.getElementById("contador").innerText=`Faltan ${dias} días 💜`;
},1000);

// animación al escribir
const inputs = document.querySelectorAll("input, textarea");
inputs.forEach(i=>{
  i.addEventListener("input", ()=>{
    i.classList.add("escribiendo");
    setTimeout(()=>i.classList.remove("escribiendo"),300);
  });
});

// mensaje flotante
function mostrarMensaje(texto){
  const div = document.createElement("div");
  div.className = "mensaje-flotante";
  div.innerText = texto;
  document.body.appendChild(div);

  setTimeout(()=>div.remove(),4000);
}

// enviar mensaje
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });

 mostrarMensaje("💜 Mensaje enviado con amor");
}
</script>

</body>
</html>
