<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins';background:#140a22;color:white;overflow-x:hidden;}

.bg-collage {position:fixed;inset:0;z-index:-1;}
.bg-collage img{
  position:absolute;
  width:200px;
  opacity:0.2;
  animation: float 20s linear infinite;
}
@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-120vh);}
}

header{text-align:center;padding:50px;}
h1{font-family:'Great Vibes';font-size:3rem;}

.section{padding:30px;text-align:center;}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* INPUTS */
input,textarea{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  width:80%;
  max-width:350px;
  background: rgba(255,255,255,0.08);
  color:#fff;
  transition: all 0.25s ease;
}

textarea{height:40px;}

input:focus, textarea:focus{
  outline:none;
  background: rgba(255,255,255,0.12);
  box-shadow:0 0 0 2px rgba(168,85,247,0.6),0 0 15px rgba(168,85,247,0.4);
  transform:scale(1.02);
}

/* PLACEHOLDER */
input::placeholder, textarea::placeholder{
  color:#c084fc;
  transition: all 0.3s ease;
}

input:focus::placeholder, textarea:focus::placeholder{
  transform: translateY(-10px);
  opacity:0.5;
  font-size:12px;
}

/* BOTON */
button{
  padding:10px;
  background:#a855f7;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* MENSAJE FLOTANTE */
.mensaje-flotante{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#a855f7;
  padding:15px 20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation: aparecer 0.5s ease, desaparecer 0.5s ease 3s forwards;
}

@keyframes aparecer{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes desaparecer{
  to{opacity:0; transform:translateY(20px);}
}

/* ESCRIBIENDO */
.escribiendo{
  box-shadow:0 0 10px rgba(168,85,247,0.7);
}

/* GALERIA */
#videos video{
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bg-collage" id="collage"></div>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<!-- 🎥 UPLOAD -->
<div class="section">
<div class="card">
<h3>🎥 Subir video</h3>
<input type="file" id="videoUpload">

<h3>📸 Subir foto</h3>
<input type="file" id="imageUpload">
</div>
</div>

<!-- 💌 MENSAJES -->
<div class="section">
<div class="card">
<h3>💌 Mensaje</h3>
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>
</div>

<!-- 📩 CONFIRMAR -->
<div class="section">
<div class="card">
<h3>📩 Confirmar asistencia</h3>
<input id="nombre" placeholder="Tu nombre">
<input id="correo" placeholder="Tu correo">
<button onclick="confirmar()">Confirmar</button>
</div>
</div>

<!-- 🎥 VIDEOS -->
<div class="section">
<div class="card">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>
</div>

<script>
const API = "https://TU-BACKEND.onrender.com";

// CONTADOR
const fecha = new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 let dias=Math.floor(d/(1000*60*60*24));
 document.getElementById("contador").innerText=`Faltan ${dias} días 💜`;
},1000);

// ANIMACIÓN ESCRIBIENDO
document.querySelectorAll("input, textarea").forEach(i=>{
 i.addEventListener("input", ()=>{
  i.classList.add("escribiendo");
  setTimeout(()=>i.classList.remove("escribiendo"),300);
 });
});

// MENSAJE FLOTANTE
function mostrarMensaje(texto){
 const div=document.createElement("div");
 div.className="mensaje-flotante";
 div.innerText=texto;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),4000);
}

// SUBIR VIDEO
videoUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-video",{method:"POST",body:f});
 mostrarMensaje("🎥 Video subido");
 cargarVideos();
};

// SUBIR IMAGEN
imageUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-image",{method:"POST",body:f});
 mostrarMensaje("📸 Imagen subida");
 cargarCollage();
};

// CONFIRMAR
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });
 mostrarMensaje("💜 Confirmación enviada");
}

// MENSAJE
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });
 mostrarMensaje("💌 Mensaje enviado");
}

// VIDEOS
async function cargarVideos(){
 let r=await fetch(API+"/videos");
 let data=await r.json();
 videos.innerHTML="";
 data.forEach(v=>{
  let el=document.createElement("video");
  el.src=API+v;
  el.controls=true;
  videos.appendChild(el);
 });
}

// COLLAGE
async function cargarCollage(){
 let r=await fetch(API+"/images");
 let data=await r.json();
 collage.innerHTML="";
 data.forEach((img,i)=>{
  let el=document.createElement("img");
  el.src=API+img;
  el.style.left=(i*20)+"%";
  collage.appendChild(el);
 });
}

cargarVideos();
cargarCollage();
</script>

</body>
</html>
