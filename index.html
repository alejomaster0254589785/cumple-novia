<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#140a22;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 6s forwards;
}
.intro-text{
  font-family:'Great Vibes';
  font-size:3rem;
  opacity:0;
  animation: aparecer 3s forwards;
}
@keyframes aparecer{to{opacity:1}}
@keyframes fadeOut{70%{opacity:1}100%{opacity:0;visibility:hidden}}

/* COLLAGE */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  padding:5px;
}
.collage-item{
  background-size:cover;
  background-position:center;
  border-radius:10px;
  filter:brightness(0.5);
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}
h1{
  font-family:'Great Vibes';
  font-size:3rem;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  margin:20px auto;
  max-width:400px;
}

/* BOTONES UPLOAD PRO */
.upload-box{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.upload-btn{
  background:#a855f7;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
.upload-btn:hover{
  background:#9333ea;
}

/* INPUTS */
input,textarea{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* BOTONES */
button{
  padding:10px 20px;
  background:#a855f7;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* VIDEOS */
#videos video{
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* MENSAJES */
#mensajesPantalla{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.mensaje-item{
  position:absolute;
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:15px;
  animation:fade 6s forwards;
}
@keyframes fade{80%{opacity:1}100%{opacity:0}}
</style>
</head>

<body>

<div id="intro">
  <div class="intro-text">Eres el amor de mi vida 💜</div>
</div>

<div id="collage"></div>
<div id="mensajesPantalla"></div>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<!-- SUBIR -->
<div class="card">
<h3>Sube tus recuerdos 💜</h3>

<div class="upload-box">

<label class="upload-btn">
📸 Subir Foto
<input type="file" id="imageUpload" hidden>
</label>

<label class="upload-btn">
🎥 Subir Video
<input type="file" id="videoUpload" hidden>
</label>

</div>

</div>

<!-- MENSAJE -->
<div class="card">
<h3>💌 Mensaje</h3>
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje"></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>

<!-- CONFIRMAR -->
<div class="card">
<h3>📩 Confirmar asistencia</h3>
<input id="nombre">
<input id="correo">
<button onclick="confirmar()">Confirmar</button>
</div>

<!-- VIDEOS -->
<div class="card">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>

<script>
const API="https://cumple-backend-lpdv.onrender.com";

/* CONTADOR */
const fecha=new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 contador.innerText="Faltan "+Math.floor(d/(1000*60*60*24))+" días 💜";
},1000);

/* UPLOAD */
imageUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-image",{method:"POST",body:f});
};

videoUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-video",{method:"POST",body:f});
};

/* MENSAJE */
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });

 nombreMsg.value="";
 mensaje.value="";
}

/* CONFIRMAR */
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });

 nombre.value="";
 correo.value="";
}
</script>

</body>
</html>

</body>
</html>
