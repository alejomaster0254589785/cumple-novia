<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#140a22;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 4s forwards;
}
.intro-text{
  font-size:2rem;
  opacity:0;
  animation: aparecerTexto 3s forwards;
}
@keyframes aparecerTexto{to{opacity:1;}}
@keyframes fadeOut{
  0%,80%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

/* COLLAGE */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
  transition: opacity 1s ease;
  filter: brightness(0.3) blur(2px);
}

/* MENSAJES EN PANTALLA */
#mensajesPantalla{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.mensaje-item{
  background: rgba(168,85,247,0.8);
  padding:10px 20px;
  border-radius:15px;
  animation: aparecerMensaje 1s ease;
}
@keyframes aparecerMensaje{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

header{
  text-align:center;
  padding:50px;
}
h1{
  font-family:'Great Vibes';
  font-size:3rem;
}

.section{
  padding:30px;
  text-align:center;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* INPUTS */
input,textarea{
  padding:10px;
  border-radius:10px;
  border:none;
  width:100%;
  max-width:300px;
  background: rgba(255,255,255,0.08);
  color:#fff;
  height:45px;
}
textarea{resize:none;}

/* UPLOAD */
.upload-box{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
.upload-btn{
  background:#a855f7;
  padding:12px 25px;
  border-radius:12px;
  cursor:pointer;
}

/* FILA */
.fila{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

button{
  height:45px;
  padding:0 20px;
  background:#a855f7;
  border:none;
  border-radius:10px;
  color:white;
}

/* VIDEOS */
#videos video{
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* MENSAJE FLOTANTE */
.mensaje-flotante{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#a855f7;
  padding:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div id="intro">
  <div class="intro-text">Una historia… 💜</div>
</div>

<div id="collage"></div>

<div id="mensajesPantalla"></div>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<!-- UPLOAD -->
<div class="section">
<div class="card">
<h3>Sube tus recuerdos 💜</h3>

<div class="upload-box">
<label class="upload-btn">
🎥 Subir video
<input type="file" id="videoUpload" hidden>
</label>

<label class="upload-btn">
📸 Subir foto
<input type="file" id="imageUpload" hidden>
</label>
</div>

</div>
</div>

<!-- MENSAJE -->
<div class="section">
<div class="card">
<h3>💌 Mensaje</h3>
<div class="fila">
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>
</div>
</div>

<!-- CONFIRMAR -->
<div class="section">
<div class="card">
<h3>📩 Confirmar asistencia</h3>
<div class="fila">
<input id="nombre" placeholder="Tu nombre">
<input id="correo" placeholder="Tu correo">
<button onclick="confirmar()">Confirmar</button>
</div>
</div>
</div>

<!-- VIDEOS -->
<div class="section">
<div class="card">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>
</div>

<script>
const API = "https://cumple-backend-lpdv.onrender.com";

// música
document.body.addEventListener("click", ()=>{
 document.getElementById("musica").play();
},{once:true});

// contador
const fecha = new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 let dias=Math.floor(d/(1000*60*60*24));
 contador.innerText=`Faltan ${dias} días 💜`;
},1000);

// mensaje flotante
function mostrarMensaje(texto){
 let div=document.createElement("div");
 div.className="mensaje-flotante";
 div.innerText=texto;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),3000);
}

// subir video
videoUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);

 await fetch(API+"/upload-video",{method:"POST",body:f});
 mostrarMensaje("🎥 Video subido");
 cargarVideos();
};

// subir imagen
imageUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);

 await fetch(API+"/upload-image",{method:"POST",body:f});
 mostrarMensaje("📸 Imagen subida");
 cargarCollage();
};

// confirmar
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });
 mostrarMensaje("💜 Confirmado");
}

// mensaje
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });
 mostrarMensaje("💌 Mensaje enviado");
 cargarMensajes();
}

// cargar mensajes en pantalla
async function cargarMensajes(){
 let r = await fetch(API + "/mensajes");
 let data = await r.json();

 let cont = document.getElementById("mensajesPantalla");
 cont.innerHTML = "";

 data.slice(-5).forEach(m=>{
  let div = document.createElement("div");
  div.className = "mensaje-item";
  div.innerText = `${m.nombre}: ${m.mensaje}`;
  cont.appendChild(div);
 });
}
setInterval(cargarMensajes,10000);

// videos
async function cargarVideos(){
 let r=await fetch(API+"/videos");
 let data=await r.json();
 videos.innerHTML="";
 data.forEach(v=>{
  let el=document.createElement("video");
  el.src=API+v;
  el.controls=true;
  videos.appendChild(el);
 });
}

// collage mejorado
let imagenes=[];
let index=0;

async function cargarCollage(){
 let r = await fetch(API + "/images");
 let todas = await r.json();

 let mejores = todas.filter(img => img.includes("best"));
 let normales = todas.filter(img => !img.includes("best"));

 imagenes = [...mejores, ...normales];

 if(imagenes.length > 0){
  cambiarFondo();
  setInterval(cambiarFondo,5000);
 }
}

function cambiarFondo(){
 collage.style.opacity=0;

 setTimeout(()=>{
  collage.style.backgroundImage=`url(${API+imagenes[index]})`;
  collage.style.opacity=1;
  index=(index+1)%imagenes.length;
 },500);
}

cargarVideos();
cargarCollage();
cargarMensajes();
</script>

</body>
</html>
