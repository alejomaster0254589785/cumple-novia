<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins';background:#140a22;color:white;}

/* 🎬 INTRO */
#intro{
  position:fixed; inset:0; background:black;
  display:flex; justify-content:center; align-items:center;
  z-index:9999; animation: fadeOut 4s forwards;
}
.intro-text{font-size:2rem;opacity:0;animation: aparecerTexto 3s forwards;}
@keyframes aparecerTexto{to{opacity:1;}}
@keyframes fadeOut{0%,80%{opacity:1;}100%{opacity:0;visibility:hidden;}}

/* 📸 COLLAGE */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
  transition: background-image 2s ease-in-out;
  filter: brightness(0.3) blur(2px);
}
#collage img{
  position:absolute;
  width:180px;
  opacity:0.15;
  animation: flotar linear infinite;
}
@keyframes flotar{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-120vh);}
}

header{text-align:center;padding:50px;}
h1{font-family:'Great Vibes';font-size:3rem;}

.section{padding:30px;text-align:center;}
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* INPUTS */
input,textarea{
  padding:10px;
  border-radius:10px;
  border:none;
  width:100%;
  max-width:300px;
  background: rgba(255,255,255,0.08);
  color:#fff;
  height:45px;
}
textarea{resize:none;}

/* BOTONES UPLOAD */
.upload-box{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.upload-btn{
  background:#a855f7;
  padding:12px 25px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}
.upload-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(168,85,247,0.7);
}

/* FILA */
.fila{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

button{
  height:45px;
  padding:0 20px;
  background:#a855f7;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* VIDEOS */
#videos video{
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* MENSAJE FLOTANTE */
.mensaje-flotante{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#a855f7;
  padding:15px 20px;
  border-radius:15px;
}

.oculto{display:none;}
</style>
</head>

<body>

<div id="intro">
  <div class="intro-text">Una historia… 💜</div>
</div>

<div id="collage"></div>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<!-- 🎥 UPLOAD -->
<div class="section">
<div class="card">
<h3>Sube tus recuerdos 💜</h3>

<div class="upload-box">
  <label class="upload-btn">
    🎥 Subir video
    <input type="file" id="videoUpload" hidden>
  </label>

  <label class="upload-btn">
    📸 Subir foto
    <input type="file" id="imageUpload" hidden>
  </label>
</div>

</div>
</div>

<!-- 💌 MENSAJE -->
<div class="section">
<div class="card">
<h3>💌 Mensaje</h3>
<div class="fila">
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>
</div>
</div>

<!-- 📩 CONFIRMAR -->
<div class="section">
<div class="card">
<h3>📩 Confirmar asistencia</h3>
<div class="fila">
<input id="nombre" placeholder="Tu nombre">
<input id="correo" placeholder="Tu correo">
<button onclick="confirmar()">Confirmar</button>
</div>
</div>
</div>

<!-- 🎥 VIDEOS -->
<div class="section">
<div class="card">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>
</div>

<script>
const API = "https://cumple-backend-lpdv.onrender.com";

// música
document.body.addEventListener("click", ()=>{
 document.getElementById("musica").play();
},{once:true});

// contador
const fecha = new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 let dias=Math.floor(d/(1000*60*60*24));
 contador.innerText=`Faltan ${dias} días 💜`;
},1000);

// mensaje flotante
function mostrarMensaje(texto){
 const div=document.createElement("div");
 div.className="mensaje-flotante";
 div.innerText=texto;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),3000);
}

// 🎥 VIDEO
document.getElementById("videoUpload").onchange = async (e)=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);

 await fetch(API+"/upload-video",{method:"POST",body:f});

 mostrarMensaje("🎥 Video subido");
 cargarVideos();
};

// 📸 IMAGEN
document.getElementById("imageUpload").onchange = async (e)=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);

 await fetch(API+"/upload-image",{method:"POST",body:f});

 mostrarMensaje("📸 Imagen subida");
 cargarCollage();
};

// 📩 CONFIRMAR
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });
 mostrarMensaje("💜 Confirmado");
}

// 💌 MENSAJE
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });
 mostrarMensaje("💌 Mensaje enviado");
}

// 🎥 CARGAR VIDEOS
async function cargarVideos(){
 let r=await fetch(API+"/videos");
 let data=await r.json();
 videos.innerHTML="";
 data.forEach(v=>{
  let el=document.createElement("video");
  el.src=API+v;
  el.controls=true;
  videos.appendChild(el);
 });
}

// 📸 COLLAGE
async function cargarCollage(){
 let r=await fetch(API+"/images");
 let data=await r.json();

 collage.innerHTML="";

 data.forEach(img=>{
  let el=document.createElement("img");
  el.src=API+img;
  el.style.left=Math.random()*100+"%";
  el.style.animationDuration=(15+Math.random()*10)+"s";
  collage.appendChild(el);
 });
}

cargarVideos();
cargarCollage();
</script>

</body>
</html>
