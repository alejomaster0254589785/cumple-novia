<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#140a22;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 4s forwards;
}
@keyframes fadeOut{80%{opacity:1}100%{opacity:0;visibility:hidden}}

/* COLLAGE */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  padding:5px;
}
.collage-item{
  background-size:cover;
  background-position:center;
  border-radius:10px;
  filter:brightness(0.5);
}

/* MENSAJES */
#mensajesPantalla{
  position:fixed;
  inset:0;
  z-index:20;
  pointer-events:none;
}
.mensaje-item{
  position:absolute;
  font-size:24px;
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:20px;
  animation: aparecer 1s, desaparecer 6s forwards;
}
@keyframes desaparecer{80%{opacity:1}100%{opacity:0}}

/* CORAZONES */
.heart{
  position:fixed;
  bottom:-20px;
  animation:flotar 6s linear;
}
@keyframes flotar{to{transform:translateY(-110vh);opacity:0}}

/* UI */
.section{padding:20px;text-align:center;}
.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  margin:10px;
}

input,textarea{
  padding:10px;
  border-radius:10px;
  border:none;
  width:90%;
  margin:5px;
}

button{
  padding:10px 20px;
  background:#a855f7;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* HISTORIAS */
#historias{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:50;
}
.story{
  width:90%;
  max-width:400px;
  height:80%;
  background-size:cover;
  border-radius:20px;
}
#btnHistoria{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#a855f7;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="intro">💜</div>

<div id="collage"></div>
<div id="mensajesPantalla"></div>

<div id="historias">
  <div class="story" id="story"></div>
</div>

<div id="btnHistoria">Ver historia</div>

<header style="text-align:center">
<h1>Feliz Cumpleaños 💜</h1>
</header>

<!-- SUBIR -->
<div class="section">
<div class="card">
<h3>Subir recuerdos</h3>
<input type="file" id="imageUpload">
<input type="file" id="videoUpload">
</div>
</div>

<!-- MENSAJE -->
<div class="section">
<div class="card">
<input id="nombreMsg" placeholder="Nombre">
<textarea id="mensaje"></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>
</div>

<!-- CONFIRMAR -->
<div class="section">
<div class="card">
<input id="nombre">
<input id="correo">
<button onclick="confirmar()">Confirmar</button>
</div>
</div>

<script>
const API="https://cumple-backend-lpdv.onrender.com";

/* COLLAGE */
let imagenes=[];

async function cargarCollage(){
 let r=await fetch(API+"/images");
 imagenes=await r.json();
 render();
}

function render(){
 collage.innerHTML="";
 for(let i=0;i<8;i++){
  let d=document.createElement("div");
  d.className="collage-item";
  d.style.backgroundImage=`url(${getImg()})`;
  collage.appendChild(d);
 }
}

function getImg(){
 let img=imagenes[Math.floor(Math.random()*imagenes.length)];
 return img.startsWith("http")?img:API+img;
}

/* MENSAJES */
async function cargarMensajes(){
 let r=await fetch(API+"/mensajes");
 let data=await r.json();

 data.slice(-3).forEach(m=>{
  let d=document.createElement("div");
  d.className="mensaje-item";
  d.innerText=m.mensaje;
  d.style.top=Math.random()*80+"%";
  d.style.left=Math.random()*80+"%";
  mensajesPantalla.appendChild(d);
  setTimeout(()=>d.remove(),6000);
 });
}
setInterval(cargarMensajes,8000);

/* CORAZONES */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="💜";
 h.style.left=Math.random()*100+"%";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},500);

/* UPLOAD */
imageUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-image",{method:"POST",body:f});
 cargarCollage();
};

videoUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-video",{method:"POST",body:f});
};

/* MENSAJE */
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });
}

/* CONFIRMAR */
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });
}

/* HISTORIAS */
btnHistoria.onclick=()=>{
 historias.style.display="flex";
 story.style.backgroundImage=`url(${getImg()})`;
};

/* INIT */
cargarCollage();
cargarMensajes();
</script>

</body>
</html>

</body>
</html>
