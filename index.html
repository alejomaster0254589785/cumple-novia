<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#140a22;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 4s forwards;
}
@keyframes fadeOut{80%{opacity:1}100%{opacity:0;visibility:hidden}}

/* COLLAGE */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  padding:5px;
}
.collage-item{
  background-size:cover;
  background-position:center;
  border-radius:10px;
  filter:brightness(0.5);
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}
h1{
  font-family:'Great Vibes';
  font-size:3rem;
}

/* SECCIONES */
.section{
  padding:20px;
  text-align:center;
}
.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  margin:10px auto;
  max-width:400px;
}

/* INPUTS */
input,textarea{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* BOTONES */
button{
  padding:10px 20px;
  background:#a855f7;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* VIDEOS */
#videos video{
  width:100%;
  max-width:300px;
  margin:10px;
  border-radius:10px;
}

/* MENSAJES TIPO TIKTOK */
#mensajesPantalla{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:20;
}
.mensaje-item{
  position:absolute;
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:20px;
  font-size:22px;
  animation:fade 6s forwards;
}
@keyframes fade{80%{opacity:1}100%{opacity:0}}

/* CORAZONES */
.heart{
  position:fixed;
  bottom:-20px;
  animation:flotar 6s linear;
}
@keyframes flotar{
  to{transform:translateY(-110vh);opacity:0}
}

/* HISTORIAS */
#historias{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:50;
  justify-content:center;
  align-items:center;
}
.story{
  width:90%;
  max-width:400px;
  height:80%;
  background-size:cover;
  border-radius:20px;
}
#barra{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  height:5px;
  background:rgba(255,255,255,0.3);
}
#progreso{
  height:100%;
  width:0%;
  background:white;
}

/* FINAL */
#final{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:100;
  justify-content:center;
  align-items:center;
  text-align:center;
}
</style>
</head>

<body>

<div id="intro">💜</div>

<div id="collage"></div>
<div id="mensajesPantalla"></div>

<!-- HISTORIAS -->
<div id="historias">
  <div id="barra"><div id="progreso"></div></div>
  <div class="story" id="story"></div>
</div>

<!-- HEADER -->
<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
<button onclick="abrirHistorias()">Ver historia 💜</button>
</header>

<!-- SUBIR -->
<div class="section">
<div class="card">
<h3>Subir recuerdos</h3>
<input type="file" id="imageUpload">
<input type="file" id="videoUpload">
</div>
</div>

<!-- MENSAJE -->
<div class="section">
<div class="card">
<h3>💌 Mensaje</h3>
<input id="nombreMsg" placeholder="Tu nombre">
<textarea id="mensaje"></textarea>
<button onclick="enviarMensaje()">Enviar</button>
</div>
</div>

<!-- CONFIRMAR -->
<div class="section">
<div class="card">
<h3>📩 Confirmar asistencia</h3>
<input id="nombre">
<input id="correo">
<button onclick="confirmar()">Confirmar</button>
</div>
</div>

<!-- VIDEOS -->
<div class="section">
<div class="card">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>
</div>

<!-- FINAL -->
<div id="final">
<h1 style="font-family:'Great Vibes';font-size:3rem;">
Eres el amor de mi vida 💜
</h1>
</div>

<script>
const API="https://cumple-backend-lpdv.onrender.com";

/* CONTADOR */
const fecha=new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 contador.innerText="Faltan "+Math.floor(d/(1000*60*60*24))+" días 💜";
},1000);

/* COLLAGE */
let imagenes=[];
async function cargarCollage(){
 let r=await fetch(API+"/images");
 imagenes=await r.json();
 render();
}
function render(){
 collage.innerHTML="";
 for(let i=0;i<8;i++){
  let d=document.createElement("div");
  d.className="collage-item";
  d.style.backgroundImage=`url(${getImg()})`;
  collage.appendChild(d);
 }
}
function getImg(){
 if(imagenes.length==0)return "";
 let img=imagenes[Math.floor(Math.random()*imagenes.length)];
 return img.startsWith("http")?img:API+img;
}

/* MENSAJES */
async function cargarMensajes(){
 let r=await fetch(API+"/mensajes");
 let data=await r.json();
 data.slice(-3).forEach(m=>{
  let d=document.createElement("div");
  d.className="mensaje-item";
  d.innerText=m.mensaje+" 💜";
  d.style.top=Math.random()*80+"%";
  d.style.left=Math.random()*80+"%";
  mensajesPantalla.appendChild(d);
  setTimeout(()=>d.remove(),6000);
 });
}
setInterval(cargarMensajes,8000);

/* CORAZONES */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="💜";
 h.style.left=Math.random()*100+"%";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},500);

/* UPLOAD */
imageUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-image",{method:"POST",body:f});
 cargarCollage();
};

videoUpload.onchange=async e=>{
 let f=new FormData();
 f.append("file",e.target.files[0]);
 await fetch(API+"/upload-video",{method:"POST",body:f});
 cargarVideos();
};

/* VIDEOS */
async function cargarVideos(){
 let r=await fetch(API+"/videos");
 let data=await r.json();
 videos.innerHTML="";
 data.forEach(v=>{
  let el=document.createElement("video");
  el.src=API+v;
  el.controls=true;
  videos.appendChild(el);
 });
}

/* MENSAJE */
async function enviarMensaje(){
 await fetch(API+"/mensaje",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombreMsg.value,
    mensaje:mensaje.value
  })
 });
}

/* CONFIRMAR */
async function confirmar(){
 await fetch(API+"/confirmar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    nombre:nombre.value,
    correo:correo.value
  })
 });
}

/* HISTORIAS */
let historiaIndex=0;
let historiasData=[];
async function abrirHistorias(){
 historias.style.display="flex";
 let r=await fetch(API+"/images");
 historiasData=await r.json();
 historiaIndex=0;
 nextStory();
}
function nextStory(){
 if(historiaIndex>=historiasData.length){
  historias.style.display="none";
  return;
 }
 story.style.backgroundImage=`url(${getImg()})`;
 progreso.style.width="0%";
 let i=0;
 let inter=setInterval(()=>{
  i+=2;
  progreso.style.width=i+"%";
  if(i>=100){
    clearInterval(inter);
    historiaIndex++;
    nextStory();
  }
 },100);
}

/* FINAL */
setTimeout(()=>{
 document.getElementById("final").style.display="flex";
},60000);

/* INIT */
cargarCollage();
cargarMensajes();
cargarVideos();
</script>

</body>
</html>

</body>
</html>
