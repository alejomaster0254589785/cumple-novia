<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#140a22;
  color:white;
  overflow:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: fadeOut 4s forwards;
}
.intro-text{
  font-size:2rem;
  animation: aparecerTexto 3s forwards;
}
@keyframes aparecerTexto{from{opacity:0} to{opacity:1}}
@keyframes fadeOut{80%{opacity:1}100%{opacity:0;visibility:hidden}}

/* COLLAGE GRID */
#collage{
  position:fixed;
  inset:0;
  z-index:-1;
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:5px;
  padding:5px;
}
.collage-item{
  background-size:cover;
  background-position:center;
  border-radius:10px;
  filter: brightness(0.5);
  transition: all 1s ease;
}

/* MENSAJES TIPO TIKTOK */
#mensajesPantalla{
  position:fixed;
  inset:0;
  z-index:20;
  pointer-events:none;
}
.mensaje-item{
  position:absolute;
  font-size:28px;
  font-weight:600;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  opacity:0;
  transform:scale(0.8);
  animation: aparecer 1s forwards, desaparecer 6s forwards;
}
@keyframes aparecer{to{opacity:1;transform:scale(1)}}
@keyframes desaparecer{80%{opacity:1}100%{opacity:0}}

/* CORAZONES */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:20px;
  color:#ff4d9e;
  animation: flotar 6s linear forwards;
}
@keyframes flotar{
  to{
    transform:translateY(-110vh) scale(1.5);
    opacity:0;
  }
}

/* HEADER */
header{
  position:fixed;
  top:10px;
  width:100%;
  text-align:center;
  z-index:10;
}
h1{
  font-family:'Great Vibes';
  font-size:2.5rem;
}

/* HISTORIAS */
#historias{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:50;
}
.story{
  width:90%;
  max-width:400px;
  height:80%;
  background-size:cover;
  background-position:center;
  border-radius:20px;
}
#barra{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  height:5px;
  background:rgba(255,255,255,0.3);
}
#progreso{
  height:100%;
  width:0%;
  background:white;
}

/* BOTON HISTORIA */
#btnHistoria{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#a855f7;
  padding:10px 20px;
  border-radius:10px;
  z-index:30;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="intro">
  <div class="intro-text">Desde el momento en que te vi… 💜</div>
</div>

<div id="collage"></div>
<div id="mensajesPantalla"></div>

<div id="historias">
  <div id="barra"><div id="progreso"></div></div>
  <div class="story" id="story"></div>
</div>

<div id="btnHistoria">Ver historia 💜</div>

<header>
<h1>Feliz Cumpleaños 💜</h1>
<div id="contador"></div>
</header>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<script>
const API="https://cumple-backend-lpdv.onrender.com";

/* MUSICA */
document.body.addEventListener("click",()=>{
 document.getElementById("musica").play();
},{once:true});

/* CONTADOR */
const fecha=new Date("2026-03-30");
setInterval(()=>{
 let d=fecha-new Date();
 contador.innerText=`Faltan ${Math.floor(d/(1000*60*60*24))} días 💜`;
},1000);

/* COLLAGE */
let imagenes=[];

async function cargarCollage(){
 let r=await fetch(API+"/images");
 imagenes=await r.json();
 renderCollage();
 setInterval(actualizarRandom,3000);
}

function renderCollage(){
 collage.innerHTML="";
 for(let i=0;i<8;i++){
  let div=document.createElement("div");
  div.className="collage-item";
  div.style.backgroundImage=`url(${getImg()})`;
  collage.appendChild(div);
 }
}

function actualizarRandom(){
 document.querySelectorAll(".collage-item").forEach(el=>{
  if(Math.random()<0.3){
    el.style.backgroundImage=`url(${getImg()})`;
  }
 });
}

function getImg(){
 let img=imagenes[Math.floor(Math.random()*imagenes.length)];
 return img.startsWith("http")?img:API+img;
}

/* MENSAJES */
async function cargarMensajes(){
 let r=await fetch(API+"/mensajes");
 let data=await r.json();

 data.slice(-3).forEach(m=>{
  let div=document.createElement("div");
  div.className="mensaje-item";
  div.innerText=m.mensaje+" 💜";

  div.style.top=Math.random()*70+"%";
  div.style.left=Math.random()*70+"%";

  mensajesPantalla.appendChild(div);
  setTimeout(()=>div.remove(),6000);
 });
}
setInterval(cargarMensajes,8000);

/* CORAZONES */
function crearCorazon(){
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="💜";
 h.style.left=Math.random()*100+"%";
 h.style.fontSize=(15+Math.random()*20)+"px";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
}
setInterval(crearCorazon,500);

/* HISTORIAS */
let index=0;

btnHistoria.onclick=()=>{
 historias.style.display="flex";
 mostrarStory();
};

function mostrarStory(){
 if(imagenes.length===0)return;

 story.style.backgroundImage=`url(${getImg()})`;

 progreso.style.width="0%";
 let i=0;

 let intervalo=setInterval(()=>{
  i+=5;
  progreso.style.width=i+"%";

  if(i>=100){
    clearInterval(intervalo);
    index++;
    mostrarStory();
  }
 },200);
}

/* INIT */
cargarCollage();
cargarMensajes();
</script>

</body>
</html>
