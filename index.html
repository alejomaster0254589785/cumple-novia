<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cumpleaños Carito 💜</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{--bg1:#140a22; --bg2:#2b1345; --accent:#a855f7; --soft:#d8b4fe;}
    *{box-sizing:border-box}

    body {margin:0;font-family:'Poppins',sans-serif;color:#fff;background:linear-gradient(180deg,var(--bg1),var(--bg2));overflow-x:hidden;}

    .bg-collage{position:fixed;inset:0;z-index:-1;overflow:hidden;filter:blur(2px) brightness(0.5);} 
    .bg-collage img{position:absolute;width:220px;height:220px;object-fit:cover;border-radius:20px;opacity:0.25;animation:float 25s infinite linear;}
    @keyframes float{0%{transform:translateY(100vh);}100%{transform:translateY(-120vh);}}

    header{text-align:center;padding:60px 20px 30px;}
    h1{font-family:'Great Vibes',cursive;font-size:3rem;margin:0;}
    .contador{font-size:1.3rem;margin-top:10px;color:var(--soft);} 

    .section{padding:40px 20px;text-align:center;} 
    .card{background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;backdrop-filter:blur(10px);max-width:900px;margin:auto;} 

    .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px;} 
    .gallery img,video{width:100%;border-radius:15px;} 

    .upload-box{border:2px dashed var(--accent);padding:30px;border-radius:15px;cursor:pointer;margin-bottom:15px;} 
    .upload-box:hover{background:rgba(168,85,247,0.2);} 

    input,textarea{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  width:80%;
  max-width:350px;
  box-sizing:border-box;
}

textarea{
  height:40px;
} 
    textarea{height:100px;resize:none;} 

    .btn{background:var(--accent);border:none;padding:12px 20px;color:white;border-radius:10px;cursor:pointer;margin-top:10px;} 

    footer{text-align:center;padding:20px;} 
  </style>
</head>
<body>

<!-- 🎵 MUSICA -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="bg-collage" id="collage"></div>

<header>
  <h1>Feliz Cumpleaños Carito 💜</h1>
  <div class="contador" id="contador"></div>
</header>

<section class="section">
  <div class="card">
    <h2>🎥 Sube tu video</h2>
    <label class="upload-box">
      Subir video 🎬
      <input type="file" id="videoUpload" accept="video/*">
    </label>

    <h2>📸 Sube una foto</h2>
    <label class="upload-box">
      Subir foto 💜
      <input type="file" id="imageUpload" accept="image/*">
    </label>
  </div>
</section>

<section class="section">
  <div class="card">
    <h2>💌 Déjale un mensaje</h2>
    <input type="text" id="nombreMsg" placeholder="Tu nombre"><br>
    <textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea><br>
    <button class="btn" onclick="enviarMensaje()">Enviar 💜</button>
  </div>
</section>

<section class="section">
  <div class="card">
    <h2>📩 Confirmar asistencia</h2>
    <input type="text" id="nombre" placeholder="Tu nombre"><br>
    <input type="email" id="correo" placeholder="Tu correo"><br>
    <button class="btn" onclick="confirmar()">Confirmar</button>
  </div>
</section>

<section class="section">
  <div class="card">
    <h2>🎥 Videos</h2>
    <div class="gallery" id="videos"></div>
  </div>
</section>

<footer>
  <p>Hecho con amor 💜</p>
</footer>

<script>
const API = "http://localhost:8000";

// CONTADOR
const fechaEvento = new Date("2026-03-30");
setInterval(()=>{
  const diff = fechaEvento - new Date();
  const dias = Math.floor(diff/(1000*60*60*24));
  const horas = Math.floor((diff/(1000*60*60))%24);
  document.getElementById("contador").innerText = `Faltan ${dias} días y ${horas} horas 🎉`;
},1000);

// VIDEO
videoUpload.onchange = async e=>{
  const form=new FormData();form.append("file",e.target.files[0]);
  await fetch(`${API}/upload-video`,{method:"POST",body:form});
  cargarVideos();
};

// IMAGE
imageUpload.onchange = async e=>{
  const form=new FormData();form.append("file",e.target.files[0]);
  await fetch(`${API}/upload-image`,{method:"POST",body:form});
  cargarCollage();
};

// CONFIRMAR + ENVIO EMAIL
async function confirmar(){
  const nombre = nombreInput.value;
  const correo = correoInput.value;

  await fetch(`${API}/confirmar`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({nombre, correo})
  });

  alert("Invitación enviada 💜");
}

// MENSAJE
async function enviarMensaje(){
  const nombre = nombreMsg.value;
  const mensaje = document.getElementById("mensaje").value;

  await fetch(`${API}/mensaje`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({nombre, mensaje})
  });

  alert("Mensaje enviado 💜");
}

// LOAD
async function cargarVideos(){
  const res = await fetch(`${API}/videos`);
  const data = await res.json();
  videos.innerHTML="";
  data.forEach(v=>{
    const el=document.createElement("video");el.src=v;el.controls=true;
    videos.appendChild(el);
  });
}

async function cargarCollage(){
  const res = await fetch(`${API}/images`);
  const data = await res.json();
  collage.innerHTML="";
  data.forEach((img,i)=>{
    const el=document.createElement("img");
    el.src=img;
    el.style.left=(i*20)+"%";
    el.style.animationDuration=(20+Math.random()*10)+"s";
    collage.appendChild(el);
  });
}

cargarVideos();
cargarCollage();
</script>

</body>
</html>
